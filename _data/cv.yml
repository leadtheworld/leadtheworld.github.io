cv:
  name: Nahyun Lee
  label: Undergraduate Researcher
  email: leadtheworld@g.skku.edu
  location: Daejeon, South Korea
  website: https://nahyunlee.com
  linkedIn: https://www.linkedin.com/in/leadtheworld
  summary: Augmenting how we perceive the world. My research explores the intersection of Cognitive Augmentation, Sensing, and Human–Computer Interaction. I aim to help people interpret an information-overloaded world.

  
  sections:

    Education:
      - institution: Sungkyunkwan University
        location: Suwon, South Korea
        area: Mechanical Engineering, Software Engineering and Self-Designed Major in HCI
        studyType: B.S.
        start_date: 2023-02
        end_date: present
        score: "GPA: 4.34/4.50"

      - institution: Hanyang University
        location: Seoul, South Korea
        area: Business Administration
        studyType: Coursework (First-Year Completed)
        start_date: 2022-03
        end_date: 2022-12

    Experience:
      - company: KAIST Wearable and Interactive Technology Lab
        position: Research Intern
        location: Daejeon, South Korea
        start_date: 2026-01
        end_date: present
        summary: Advised by Ian Oakley
        highlights:
          - Investigating beamforming-based audio sensing to enhance perception of everyday information
          - Developing audio-driven granular synthesis for high-DOF vibrotactile feedback in haptic interaction

      - company: Smart Biomedical Lab, Sungkyunkwan University
        position: Research Intern
        location: Suwon, South Korea
        start_date: 2025-06
        end_date: 2025-12
        summary: Advised by Jowoon Chong
        highlights:
          - Developed a load cell– and IMU–based muscle function assessment device with BLE
          - Built a mobile app for real-time sensing and accessible interaction for older adults
          - Collaborated with Korea University Medicine and KAIST on muscle function assessment for older adults

      - company: Interaction Independence Study, Stanford Center at the Incheon Global Campus
        position: Research Assistant
        location: Incheon, South Korea
        start_date: 2024-03
        end_date: 2025-12
        summary: Advised by Hoseok Jung
        highlights:
          - Prototyped thermal haptic interfaces based on radiative and convective heat transfer
          - Developed a physics-based fire visualization pipeline using Fire Dynamics Simulator (FDS) for AR/VR
          - Collaborated with TU Wien and Imperial College London on thermal haptics for firefighter training

      - company: Modly
        position: Co-Founder
        location: Suwon, South Korea
        start_date: 2025-02
        end_date: 2026-01
        highlights:
          - Selected for the Korean I-Corps program (Ministry of Science and ICT); trained at George Washington University
          - Led business strategy for a 3D scanning service, conducting 100+ user interviews to identify viable applications

      - company: AiGENDA
        position: AI Developer
        location: Suwon, South Korea
        start_date: 2024-06
        end_date: 2024-08
        highlights:
          - Developed a lecture-based video Q&A system using STT, LLMs, and LangChain
          - Enhanced domain-specific terminology recognition (60% → 98%) using RAG and vector databases

    Publications:
      - title: Is This Enough to Decide? Facilitating Informed Investment Decisions by Visualizing Missing Evidence
        authors:
          - Nahyun Lee
          - Hyeon Jeon
        publisher: ACM CHI EA
        releaseDate: 2026

      - title: A Low-Cost Quantitative Evaluation Testbed of Small-Sized IMU Sensor Modules Using a Smartphone
        authors:
          - Myeongjun Kim
          - Seungmin Lee
          - Junjae Park
          - Nahyun Lee
          - Jowoon Chong
        publisher: ICCE-Asia
        releaseDate: 2025

    Awards:
      - title: Presidential Science Scholarship
        date: 2025
        awarder: Ministry of Science and ICT

      - title: Cho Byung-Doo Scholarship
        date: 2025

      - title: Korea Entegris Scholarship
        date: 2024

      - title: Hyeong-Ae Scholarship
        date: 2024

      - title: Top 3% Academic Excellence Scholarship
        date: 2023

    Projects:
      - name: Audio-driven Haptic Interaction
        summary: High-DOF vibrotactile feedback using granular synthesis

      - name: Thermal Haptics for Fire Simulation
        summary: Physics-based AR/VR fire visualization using FDS

    Skills:
      - name: Programming
        keywords: "Python, C/C++, Unity"

      - name: HCI/XR
        keywords: "Haptics, Audio Interaction, AR/VR"

      - name: AI/ML
        keywords: "PyTorch, RAG, LangChain"

      - name: Hardware
        keywords: "Arduino, IMU, BLE"

    Languages:
      - name: Korean
        summary: Native

      - name: English
        summary: Full professional

    Interests:
      - name: Research Thinking
        keywords: "Financial Planning, Long-term Strategy, Systems Thinking"

      - name: Personal
        keywords: "Birdwatching"


